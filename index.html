<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Κομποσκοίνι">
    <meta name="display" content="standalone">

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #0f0f0f; 
            color: #d4af37; 
            font-family: 'Times New Roman', Times, serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            touch-action: manipulation; 
        }
        #prayer-text { font-size: 1.9rem; text-align: center; margin-bottom: 20px; padding: 0 15px; min-height: 4.5rem; line-height: 1.3; color: #d4af37; font-weight: 500; }
        .controls { margin-bottom: 20px; background: rgba(212, 175, 55, 0.05); padding: 15px; border-radius: 12px; width: 88%; max-width: 300px; box-sizing: border-box; border: 1px solid rgba(212, 175, 55, 0.1); }
        select, input[type="number"] { background: #1a1a1a; color: #d4af37; border: 1px solid #3d3d3d; padding: 12px; border-radius: 8px; outline: none; width: 100%; font-size: 1.1rem; font-family: inherit; }
        .vibration-options { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .vibration-toggle { display: flex; align-items: center; gap: 12px; font-size: 1rem; color: #999; cursor: pointer; position: relative; }
        .vibration-toggle input { position: absolute; opacity: 0; }
        .checkmark { height: 20px; width: 20px; border: 2px solid #d4af37; border-radius: 50%; display: inline-block; position: relative; }
        .vibration-toggle input:checked ~ .checkmark:after { content: ""; position: absolute; top: 4px; left: 4px; width: 12px; height: 12px; border-radius: 50%; background: #d4af37; }
        #bead-container { width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border: 2px solid #d4af37; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.9); transition: transform 0.05s ease; }
        #bead-container:active { transform: scale(0.95); border-color: #ffffff; }
        .classic-cross-svg { width: 90px; height: 110px; fill: #d4af37; margin-bottom: 2px; }
        #current-count { font-size: 3.5rem; font-weight: bold; color: #d4af37; }
        #target-display { font-size: 0.9rem; opacity: 0.6; letter-spacing: 1.5px; text-transform: uppercase; }
        .goal-reached { border-color: #ffffff !important; box-shadow: 0 0 50px rgba(212, 175, 55, 0.4) !important; }
        #stats { margin-top: 25px; text-align: center; }
        .reset-btn { background: transparent; border: 1px solid #444; color: #777; padding: 10px 22px; font-size: 0.9rem; border-radius: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="prayer-text">Κύριε Ἰησοῦ Χριστέ, ἐλέησόν με</div>

    <div class="controls">
        <select id="knot-select" onchange="handleSelectChange()">
            <option value="33">33 κόμποι</option>
            <option value="100">100 κόμποι</option>
            <option value="300">300 κόμποι</option>
            <option value="custom">Custom (ὁρίστε ἀριθμό)</option>
            <option value="free">Ἐλεύθερο (χωρίς στόχο)</option>
        </select>
        <input type="number" id="custom-input" style="display:none; margin-top:10px;" oninput="updateTarget()">

        <div class="vibration-options">
            <label class="vibration-toggle">
                <input type="radio" name="vib-mode" id="vib-every" checked> 
                <span class="checkmark"></span>
                <span>Δόνηση σὲ κάθε κόμπο</span>
            </label>
            <label class="vibration-toggle">
                <input type="radio" name="vib-mode" id="vib-end"> 
                <span class="checkmark"></span>
                <span>Δόνηση μόνο στὸν τερματισμό</span>
            </label>
        </div>
    </div>

    <div id="bead-container" onclick="countBead()">
        <svg class="classic-cross-svg" viewBox="0 0 24 24"><path d="M10 2h4v5h5v4h-5v11h-4v-11h-5v-4h5z"/></svg>
        <span id="current-count">33</span>
        <span id="target-display">ΥΠΟΛΟΙΠΟ</span>
    </div>

    <div id="stats">
        <div style="margin-bottom:10px; font-size: 1rem; opacity: 0.5;">
            ΣΥΝΟΛΙΚΑ: <span id="total-count">0</span> | ΚΥΚΛΟΙ: <span id="cycle-count">0</span>
        </div>
        <button class="reset-btn" onclick="resetCounter()">Μηδενισμός</button>
    </div>

    <script>
        let count=0, total=0, cycles=0, target=33, wakeLock=null;

        document.addEventListener('touchstart', function() {
            if (!wakeLock) {
                if (navigator.vibrate) navigator.vibrate(5);
                if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(w => wakeLock = w);
            }
        }, {once: true}); 

        function handleSelectChange() {
            const s = document.getElementById('knot-select'), c = document.getElementById('custom-input');
            c.style.display = (s.value === 'custom') ? 'block' : 'none';
            target = (s.value === 'free') ? 0 : (s.value === 'custom') ? (parseInt(c.value) || 0) : parseInt(s.value);
            resetCycle();
        }

        function updateTarget() { target = parseInt(document.getElementById('custom-input').value) || 0; resetCycle(); }

        function countBead() {
            count++; total++;
            const e = document.getElementById('vib-every').checked;
            if (navigator.vibrate) {
                if (target > 0 && count === target) {
                    cycles++;
                    let p = []; for(let i=0; i<cycles; i++) { p.push(300); if(i<cycles-1) p.push(150); }
                    navigator.vibrate(p);
                } else if (e) { navigator.vibrate([75]); }
            }
            if (target > 0 && count === target) document.getElementById('bead-container').classList.add('goal-reached');
            if (target > 0 && count > target) { resetCycle(); count = 1; }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('current-count').innerText = (target === 0) ? count : target - count;
            document.getElementById('target-display').innerText = (target === 0) ? "ΕΛΕΥΘΕΡΟ" : "ΥΠΟΛΟΙΠΟ";
            document.getElementById('total-count').innerText = total;
            document.getElementById('cycle-count').innerText = cycles;
        }

        function resetCycle() { count = 0; document.getElementById('bead-container').classList.remove('goal-reached'); updateDisplay(); }
        function resetCounter() { total = 0; cycles = 0; resetCycle(); }
        updateDisplay();
    </script>
</body>
</html>
