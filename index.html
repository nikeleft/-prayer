<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Κομποσκοίνι">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0a0a0a">

    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: #0a0a0a;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: #d4af37; font-family: 'Times New Roman', serif; 
            display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f0f0f; display: flex; align-items: center; justify-content: center; 
            z-index: 99999; transition: opacity 0.5s ease-out; pointer-events: none;
        }
        #splash-screen img { width: 180px; height: 180px; border-radius: 40px; border: 1px solid #d4af37; }

        #dim-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9000; display: none; }

        #prayer-area { width: 100%; text-align: center; padding-top: 40px; padding-bottom: 5px; flex-shrink: 0; min-height: 120px; }
        
        /* ΑΦΑΙΡΕΣΗ ITALIC ΕΔΩ */
        #prayer-text { font-size: 1.5rem; line-height: 1.3; min-height: 4.5rem; display: flex; align-items: center; justify-content: center; padding: 0 15px; color: #d4af37; font-style: normal; font-weight: 500; }

        .settings-container { 
            width: 100%; max-width: 360px; margin: 5px auto; border: 1px solid #d4af37; 
            border-radius: 15px; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); overflow: hidden; z-index: 10;
        }
        #settings-toggle { 
            width: 100%; padding: 12px; background: rgba(212, 175, 55, 0.15); color: #d4af37; 
            border: none; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 0.9rem;
        }
        
        #settings-content { max-height: 0; overflow-y: auto; transition: max-height 0.4s ease-in-out; }
        #settings-content.open { max-height: 60vh; padding: 15px; }

        input[type="text"], select, input[type="number"] { 
            background: #151515; color: #d4af37; border: 1px solid #d4af37; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; text-align: center; font-size: 16px; font-family: inherit; outline: none;
        }

        .section-box { border-bottom: 1px solid rgba(212,175,55,0.15); padding-bottom: 12px; margin-bottom: 12px; }
        .option-label { font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 8px; text-align: center; color: #d4af37; font-weight: bold; letter-spacing: 1px; }
        
        .toggle-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: #d4af37; font-size: 0.9rem; cursor: pointer; }

        .prayer-item { display: flex; justify-content: space-between; align-items: center; background: rgba(212,175,55,0.07); padding: 10px; border-radius: 8px; margin-bottom: 6px; font-size: 0.85rem; border: 1px solid rgba(212,175,55,0.2); }
        .del-btn { color: #ff4444; font-weight: bold; padding: 0 8px; cursor: pointer; font-size: 1.1rem; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        
        #bead-container { 
            width: 50vw; height: 50vw; max-width: 180px; max-height: 180px; border-radius: 50%; 
            background: radial-gradient(circle, #252525 0%, #000 100%); border: 3px solid #d4af37; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.9); transition: transform 0.05s;
        }
        #bead-container:active { transform: scale(0.97); }
        #current-count { font-size: 3rem; font-weight: bold; line-height: 1; }

        .info-bar { 
            width: 100%; max-width: 360px; display: flex; justify-content: space-evenly; align-items: center; 
            font-size: 0.7rem; color: rgba(212, 175, 55, 0.9); padding: 10px 0; border-top: 1px solid rgba(212, 175, 55, 0.1);
        }
        .info-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .info-value { font-weight: bold; font-size: 0.85rem; color: #fff; }

        .timer-wrapper { 
            display: flex; align-items: center; gap: 6px; background: rgba(212, 175, 55, 0.1); 
            padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2);
        }
        #pause-btn { background: none; border: none; color: #d4af37; font-size: 1rem; cursor: pointer; padding: 0; }
        
        .dim-btn { background: #d4af37; color: #000; border: none; padding: 10px 25px; border-radius: 30px; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .reset-btn { background: transparent; border: 1px solid rgba(212,175,55,0.3); color: #d4af37; padding: 5px 15px; border-radius: 20px; font-size: 0.6rem; margin-top: 5px; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="splash-screen"><img src="icon.png" onerror="this.style.display='none'"></div>
    <div id="dim-overlay" onclick="countBead()"></div>

    <div id="prayer-area">
        <div id="prayer-text">Φόρτωση...</div>
        <div style="font-size: 0.6rem; opacity: 0.4; margin-top: 5px;">Σύρετε δεξιά/αριστερά για αλλαγή</div>
    </div>

    <div class="settings-container">
        <button id="settings-toggle" onclick="toggleSettings()">⚙ ΡΥΘΜΙΣΕΙΣ <span id="arrow">▼</span></button>
        <div id="settings-content">
            <div class="section-box">
                <span class="option-label">Κανόνας</span>
                <select id="knot-select" onchange="updateSettings()">
                    <option value="33">33 κόμποι</option>
                    <option value="100">100 κόμποι</option>
                    <option value="custom">Επιλογή κόμπων</option>
                    <option value="free">Χωρίς στόχο</option>
                </select>
                <input type="number" id="custom-input" style="display:none;" placeholder="Αριθμός..." oninput="updateSettings()">
            </div>
            <div class="section-box">
                <span class="option-label">Δόνηση</span>
                <label class="toggle-row"><input type="checkbox" id="vib-on" onclick="saveVib(this)"> Σε κάθε κόμπο</label>
                <label class="toggle-row"><input type="checkbox" id="vib-off" onclick="saveVib(this)"> Μόνο στον τερματισμό</label>
            </div>
            <div class="section-box" style="border-bottom:none;">
                <span class="option-label">Προσευχές</span>
                <div style="display:flex; gap:5px; margin-bottom:15px;">
                    <input type="text" id="new-prayer-input" placeholder="Νέα προσευχή..." style="margin:0; font-size:14px;">
                    <button onclick="addNewPrayer()" style="background:#d4af37; border:none; border-radius:8px; padding:0 15px; font-weight:bold; color:#000;">+</button>
                </div>
                <div id="prayers-list-edit"></div>
            </div>
        </div>
    </div>

    <div id="main-area">
        <div id="bead-container" onclick="countBead()">
            <span id="current-count">33</span>
            <span style="font-size:0.6rem; opacity:0.6; letter-spacing:1px;">ΥΠΟΛΟΙΠΟ</span>
        </div>
        
        <button class="dim-btn" onclick="setDim(true)">Σκοτεινή Οθόνη</button>
        
        <div class="info-bar">
            <div class="info-item">
                <span>ΣΥΝΟΛΟ</span>
                <span id="total" class="info-value">0</span>
            </div>
            <div class="info-item">
                <span>ΚΥΚΛΟΙ</span>
                <span id="cycles" class="info-value">0</span>
            </div>
            <div class="info-item">
                <span>ΧΡΟΝΟΣ</span>
                <div class="timer-wrapper">
                    <span id="session-timer" class="info-value" style="color:#d4af37">00:00:00</span>
                    <button id="pause-btn" onclick="toggleTimer(event)">⏸</button>
                </div>
            </div>
        </div>

        <button class="reset-btn" onclick="resetAll()">ΜΗΔΕΝΙΣΜΟΣ</button>
    </div>

    <script>
        // Emergency Splash Clear
        window.addEventListener('load', () => {
            setTimeout(() => {
                const ss = document.getElementById('splash-screen');
                if(ss) { ss.style.opacity = '0'; setTimeout(() => ss.remove(), 600); }
            }, 1200);
        });

        let count = 0, total = 0, target = 33, cycles = 0;
        let elapsedBeforePause = 0, startTime = null, sessionInterval = null, isPaused = true;
        let pIndex = 0;
        let startX = 0;

        const defaultPrayers = ["Κύριε Ἰησοῦ Χριστέ,<br>ἐλέησόν με", "Ὑπεραγία Θεοτόκε,<br>σῶσον ἡμᾶς", "Ἅγιε τοῦ Θεοῦ,<br>πρέσβευε ὑπὲρ ἡμῶν"];
        let prayers = JSON.parse(localStorage.getItem('my_prayers')) || [...defaultPrayers];

        function toggleSettings() {
            const c = document.getElementById('settings-content');
            c.classList.toggle('open');
            document.getElementById('arrow').innerText = c.classList.contains('open') ? '▲' : '▼';
            if(c.classList.contains('open')) renderPrayerList();
        }

        function addNewPrayer() {
            const input = document.getElementById('new-prayer-input');
            const val = input.value.trim();
            if (val) {
                prayers.push(val);
                savePrayers();
                input.value = '';
                renderPrayerList();
                if (prayers.length === 1) updatePrayerDisplay();
            }
        }

        function removePrayer(index) {
            if (prayers.length <= 1) return;
            prayers.splice(index, 1);
            if (pIndex >= prayers.length) pIndex = 0;
            savePrayers();
            renderPrayerList();
            updatePrayerDisplay();
        }

        function renderPrayerList() {
            const list = document.getElementById('prayers-list-edit');
            list.innerHTML = prayers.map((p, i) => `
                <div class="prayer-item">
                    <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p.replace('<br>', ' ')}</span>
                    <span class="del-btn" onclick="removePrayer(${i})">✕</span>
                </div>
            `).join('');
        }

        function savePrayers() { localStorage.setItem('my_prayers', JSON.stringify(prayers)); }
        function updatePrayerDisplay() { document.getElementById('prayer-text').innerHTML = prayers[pIndex] || "Επιλέξτε προσευχή"; }

        // SWIPE LOGIC
        document.getElementById('prayer-area').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('prayer-area').addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) pIndex = (pIndex + 1) % prayers.length;
                else pIndex = (pIndex - 1 + prayers.length) % prayers.length;
                updatePrayerDisplay();
            }
        });

        function saveVib(checkbox) {
            document.getElementById('vib-on').checked = (checkbox.id === 'vib-on' && checkbox.checked);
            document.getElementById('vib-off').checked = (checkbox.id === 'vib-off' && checkbox.checked);
            localStorage.setItem('vib_on', document.getElementById('vib-on').checked);
            localStorage.setItem('vib_off', document.getElementById('vib-off').checked);
        }

        function setDim(show) { document.getElementById('dim-overlay').style.display = show ? 'block' : 'none'; }

        function toggleTimer(e) {
            if (e) e.stopPropagation();
            isPaused ? startTimer() : pauseTimer();
        }

        function startTimer() {
            if (!isPaused) return;
            isPaused = false;
            startTime = Date.now();
            sessionInterval = setInterval(updateSessionUI, 1000);
            document.getElementById('pause-btn').innerText = "⏸";
        }

        function pauseTimer() {
            if (isPaused) return;
            isPaused = true;
            elapsedBeforePause += Date.now() - startTime;
            clearInterval(sessionInterval);
            document.getElementById('pause-btn').innerText = "▶";
            localStorage.setItem('elapsed_time', elapsedBeforePause);
        }

        function updateSessionUI() {
            let ms = elapsedBeforePause + (isPaused ? 0 : (Date.now() - startTime));
            let s = Math.floor(ms / 1000);
            let h = Math.floor(s / 3600).toString().padStart(2, '0');
            let m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            let sec = (s % 60).toString().padStart(2, '0');
            document.getElementById('session-timer').innerText = `${h}:${m}:${sec}`;
        }

        function countBead() {
            if (isPaused) startTimer();
            total++;
            count++;
            if (target > 0 && count >= target) {
                cycles++;
                count = 0;
                let pattern = [];
                for(let i=0; i<cycles; i++) { pattern.push(300); if(i<cycles-1) pattern.push(150); }
                navigator.vibrate(pattern);
            } else if (document.getElementById('vib-on').checked) {
                navigator.vibrate(50);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('current-count').innerText = target > 0 ? (target - count) : total;
            document.getElementById('total').innerText = total;
            document.getElementById('cycles').innerText = cycles;
        }

        function updateSettings() {
            const s = document.getElementById('knot-select');
            const ci = document.getElementById('custom-input');
            ci.style.display = s.value === 'custom' ? 'block' : 'none';
            target = s.value === 'free' ? 0 : (s.value === 'custom' ? parseInt(ci.value)||33 : parseInt(s.value));
            localStorage.setItem('last_rule', s.value);
            resetAll();
        }

        function resetAll() {
            count = 0; total = 0; cycles = 0; elapsedBeforePause = 0;
            if(sessionInterval) clearInterval(sessionInterval);
            isPaused = true; startTime = null;
            document.getElementById('session-timer').innerText = "00:00:00";
            document.getElementById('pause-btn').innerText = "▶";
            updateUI();
        }

        window.onload = () => {
            updatePrayerDisplay();
            document.getElementById('vib-on').checked = localStorage.getItem('vib_on') === 'true';
            document.getElementById('vib-off').checked = localStorage.getItem('vib_off') === 'true';
            const lr = localStorage.getItem('last_rule');
            if(lr) { 
                document.getElementById('knot-select').value = lr; 
                updateSettings(); 
            }
            updateUI();
        };
    </script>
</body>
</html>
