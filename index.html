<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">

    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: #0a0a0a;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: #d4af37; font-family: 'Times New Roman', serif; 
            display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0a0a0a; display: flex; align-items: center; justify-content: center; 
            z-index: 999999; transition: opacity 0.8s ease; pointer-events: none;
        }
        #splash-icon { width: 160px; height: 160px; object-fit: contain; }

        #dim-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 90000; display: none; }

        /* Περιοχή Προσευχής */
        #prayer-area { 
            width: 100%; text-align: center; padding-top: 40px; flex-shrink: 0; min-height: 120px; 
            touch-action: none; /* Κρίσιμο για το swipe */
            cursor: pointer;
        }
        #prayer-text { 
            font-size: 1.6rem; line-height: 1.3; min-height: 4.5rem; display: flex; 
            align-items: center; justify-content: center; padding: 0 20px; 
            color: #d4af37; font-weight: 500; transition: transform 0.2s ease-out, opacity 0.2s;
        }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        
        #bead-container { 
            width: 60vw; height: 60vw; max-width: 220px; max-height: 220px; border-radius: 50%; 
            background: radial-gradient(circle, #252525 0%, #000 100%); border: 4px solid #d4af37; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.9); transition: transform 0.05s; cursor: pointer;
        }
        #bead-container:active { transform: scale(0.95); }
        #current-count { font-size: 3.8rem; font-weight: bold; line-height: 1; margin: 0; }

        .nav-btn { background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; color: #d4af37; padding: 10px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.65rem; text-transform: uppercase; }
        input, select { background: #1a1a1a; color: #fff; border: 1px solid #d4af37; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 15px; font-family: inherit; font-size: 1rem; outline: none; }
        
        .info-bar { width: 100%; max-width: 380px; display: flex; justify-content: space-around; align-items: center; padding: 12px 0; border-top: 1px solid rgba(212, 175, 55, 0.1); font-size: 0.7rem; }
        .info-value { display: block; font-weight: bold; font-size: 0.95rem; color: #fff; margin-top: 4px; }

        #timer-toggle {
            background: none; border: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37;
            border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; margin-bottom: 5px; font-size: 0.8rem;
        }

        .reset-btn { background: transparent; border: 1px solid rgba(212,175,55,0.4); color: #d4af37; padding: 12px 30px; border-radius: 25px; font-size: 1rem; margin-top: 10px; font-weight: bold; cursor: pointer; }

        .panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); border-top: 2px solid #d4af37; border-radius: 30px 30px 0 0; z-index: 10000; transition: bottom 0.4s ease; padding: 30px 20px; overflow-y: auto; }
        .panel.open { bottom: 0; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .add-btn { background: #d4af37; color: #000; border: none; padding: 10px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="icon.png" id="splash-icon" alt="">
    </div>

    <div id="dim-overlay"></div>

    <div id="prayer-area">
        <div id="prayer-text"></div>
    </div>

    <div id="main-area">
        <div id="bead-container" onclick="countBead()">
            <span id="current-count">0</span>
        </div>

        <div style="display:flex; gap:8px;">
            <button class="nav-btn" onclick="togglePanel('settings-panel')">⚙ ΚΑΝΟΝΑΣ</button>
            <button class="nav-btn" onclick="togglePanel('prayer-panel')">🙏 ΠΡΟΣΕΥΧΕΣ</button>
            <button class="nav-btn" onclick="setDim(true)">🌙 ΝΥΧΤΑ</button>
        </div>

        <div class="info-bar">
            <div style="text-align:center;">ΣΥΝΟΛΟ <span id="total" class="info-value">0</span></div>
            <div id="cycles-container" style="text-align:center;">ΚΥΚΛΟΙ <span id="cycles" class="info-value">0</span></div>
            <div style="text-align:center; display: flex; flex-direction: column; align-items: center;">
                <button id="timer-toggle" onclick="toggleTimer()">▶</button>
                ΧΡΟΝΟΣ <span id="session-timer" class="info-value">00:00:00</span>
            </div>
        </div>
        
        <button class="reset-btn" onclick="resetAll()">ΒΑΖΩ ΑΡΧΗ</button>
    </div>

    <div id="settings-panel" class="panel">
        <div class="panel-header"><h3>Ρυθμίσεις Κανόνα</h3><span style="cursor:pointer;font-size:1.5rem;" onclick="togglePanel('settings-panel')">✕</span></div>
        <label>Επιλογὴ Κόμπων</label>
        <select id="knot-select" onchange="updateSettings()">
            <option value="33">33 κόμποι</option>
            <option value="100">100 κόμποι</option>
            <option value="300">300 κόμποι</option>
            <option value="free">Νά 'ναι εὐλογημένο (ἐλεύθερο)</option>
            <option value="custom">Επιλογή...</option>
        </select>
        <input type="number" id="custom-input" style="display:none;" placeholder="Αριθμός..." oninput="updateSettings()">
    </div>

    <div id="prayer-panel" class="panel">
        <div class="panel-header"><h3>Επιλογὴ Προσευχῆς</h3><span style="cursor:pointer;font-size:1.5rem;" onclick="togglePanel('prayer-panel')">✕</span></div>
        <label>Προσευχὴ</label>
        <select id="prayer-select" onchange="updatePrayer()">
            </select>
        
        <hr style="border: 0; border-top: 1px solid rgba(212,175,55,0.2); margin: 20px 0;">
        
        <label>Προσθήκη Νέας Προσευχῆς</label>
        <input type="text" id="new-prayer-input" placeholder="Γράψτε τὴν προσευχὴ ἐδῶ...">
        <button class="add-btn" onclick="addNewPrayer()">ΠΡΟΣΘΗΚΗ</button>
        <p style="font-size: 0.8rem; color: #888; margin-top: 15px; text-align: center;">Σύρετε (swipe) πάνω στην προσευχή στην κύρια οθόνη για γρήγορη αλλαγή.</p>
    </div>

    <script>
        // Δεδομένα και Αποθήκευση
        let count = parseInt(localStorage.getItem('count')) || 0;
        let total = parseInt(localStorage.getItem('total')) || 0;
        let cycles = parseInt(localStorage.getItem('cycles')) || 0;
        let target = localStorage.getItem('target') || "33";
        
        const defaultPrayers = [
            "Κύριε Ἰησοῦ Χριστέ, ἐλέησόν με",
            "Ὑπεραγία Θεοτόκε, σῶσον ἡμᾶς",
            "Ἅγιε/α ..., πρέσβευε ὑπὲρ ἐμοῦ"
        ];
        let customPrayers = JSON.parse(localStorage.getItem('customPrayers')) || defaultPrayers;
        let currentPrayerIdx = parseInt(localStorage.getItem('currentPrayerIdx')) || 0;

        let isPaused = true, startTime = null, elapsedAtPause = 0, timerInterval;

        // SWIPE LOGIC
        let touchStartX = 0;
        let touchEndX = 0;
        const prayerArea = document.getElementById('prayer-area');
        const prayerText = document.getElementById('prayer-text');

        prayerArea.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: false});

        prayerArea.addEventListener('touchmove', e => {
            e.preventDefault(); // Εμποδίζει το scroll κατά το swipe
        }, {passive: false});

        prayerArea.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: false});

        function handleSwipe() {
            const threshold = 50;
            if (touchStartX - touchEndX > threshold) {
                // Swipe Left -> Επόμενη
                currentPrayerIdx = (currentPrayerIdx + 1) % customPrayers.length;
                navigator.vibrate(25);
                animatePrayerChange('left');
            } else if (touchEndX - touchStartX > threshold) {
                // Swipe Right -> Προηγούμενη
                currentPrayerIdx = (currentPrayerIdx - 1 + customPrayers.length) % customPrayers.length;
                navigator.vibrate(25);
                animatePrayerChange('right');
            }
        }

        function animatePrayerChange(dir) {
            prayerText.style.opacity = "0";
            prayerText.style.transform = dir === 'left' ? "translateX(-20px)" : "translateX(20px)";
            
            setTimeout(() => {
                save();
                updateUI();
                populatePrayerSelect();
                prayerText.style.transform = dir === 'left' ? "translateX(20px)" : "translateX(-20px)";
                setTimeout(() => {
                    prayerText.style.opacity = "1";
                    prayerText.style.transform = "translateX(0)";
                }, 50);
            }, 200);
        }

        function save() {
            localStorage.setItem('count', count);
            localStorage.setItem('total', total);
            localStorage.setItem('cycles', cycles);
            localStorage.setItem('target', target);
            localStorage.setItem('customPrayers', JSON.stringify(customPrayers));
            localStorage.setItem('currentPrayerIdx', currentPrayerIdx);
        }

        function countBead() {
            if(isPaused) startTimer();
            count++; total++;
            if(target !== "free") {
                let t = parseInt(target);
                if(count >= t) { cycles++; count = 0; navigator.vibrate([200, 100, 200]); }
                else { navigator.vibrate(40); }
            } else { navigator.vibrate(40); }
            save(); updateUI();
        }

        function updateUI() {
            const display = document.getElementById('current-count');
            const cyclesDiv = document.getElementById('cycles-container');
            if(target === "free") {
                display.innerText = count;
                cyclesDiv.style.visibility = 'hidden';
            } else {
                display.innerText = parseInt(target) - count;
                cyclesDiv.style.visibility = 'visible';
                document.getElementById('cycles').innerText = cycles;
            }
            document.getElementById('total').innerText = total;
            prayerText.innerText = customPrayers[currentPrayerIdx];
        }

        function startTimer() {
            if(!isPaused) return; 
            isPaused = false; startTime = Date.now();
            document.getElementById('timer-toggle').innerText = "⏸";
            timerInterval = setInterval(() => {
                let ms = elapsedAtPause + (Date.now() - startTime);
                let s = Math.floor(ms / 1000);
                document.getElementById('session-timer').innerText =
                    `${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        function toggleTimer() {
            if(isPaused) startTimer();
            else {
                isPaused = true; elapsedAtPause += (Date.now() - startTime);
                clearInterval(timerInterval);
                document.getElementById('timer-toggle').innerText = "▶";
            }
        }

        function resetAll() {
            if(!confirm("Εἶστε σίγουροι ὅτι θέλετε νὰ μηδενίσετε τὰ πάντα;")) return;
            count = 0; total = 0; cycles = 0; elapsedAtPause = 0;
            if(timerInterval) clearInterval(timerInterval);
            isPaused = true;
            document.getElementById('session-timer').innerText = "00:00:00";
            document.getElementById('timer-toggle').innerText = "▶";
            save(); updateUI();
        }

        function updateSettings() {
            const s = document.getElementById('knot-select'), ci = document.getElementById('custom-input');
            if(s.value === 'custom') { ci.style.display = 'block'; target = ci.value || "33"; }
            else if(s.value === 'free') { ci.style.display = 'none'; target = "free"; }
            else { ci.style.display = 'none'; target = s.value; }
            count = 0; save(); updateUI();
        }

        function populatePrayerSelect() {
            const select = document.getElementById('prayer-select');
            select.innerHTML = "";
            customPrayers.forEach((p, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerText = p;
                if(index === currentPrayerIdx) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function updatePrayer() {
            currentPrayerIdx = parseInt(document.getElementById('prayer-select').value);
            save(); updateUI();
        }

        function addNewPrayer() {
            const input = document.getElementById('new-prayer-input');
            if(input.value.trim() !== "") {
                customPrayers.push(input.value.trim());
                input.value = "";
                populatePrayerSelect();
                save();
                alert("Ἡ προσευχὴ προστέθηκε!");
            }
        }

        function setDim(show) { document.getElementById('dim-overlay').style.display = show ? 'block' : 'none'; }
        document.getElementById('dim-overlay').onclick = () => setDim(false);

        window.onload = () => {
            populatePrayerSelect();
            document.getElementById('knot-select').value = target;
            if(target === "custom") document.getElementById('custom-input').style.display = 'block';
            updateUI();
            
            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 2000);
        };

        function togglePanel(id) { document.getElementById(id).classList.toggle('open'); }
    </script>
</body>
</html>
