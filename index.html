<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Κομποσκοίνι">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0a0a0a">

    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: #0a0a0a;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: #d4af37; font-family: 'Times New Roman', serif; 
            display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f0f0f; display: flex; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.8s; 
        }
        #splash-screen img { width: 240px; height: 240px; border-radius: 45px; box-shadow: 0 0 50px rgba(212,175,55,0.25); animation: pulse 2.5s infinite ease-in-out; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.95; } 50% { transform: scale(1.03); opacity: 1; } 100% { transform: scale(1); opacity: 0.95; } }

        #dim-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9000; display: none; }

        #prayer-area { width: 100%; text-align: center; padding-top: 50px; padding-bottom: 10px; flex-shrink: 0; }
        #prayer-text { font-size: 1.6rem; line-height: 1.3; min-height: 5rem; display: flex; align-items: center; justify-content: center; padding: 0 10px; color: #d4af37; }

        .settings-container { 
            width: 100%; max-width: 350px; margin: 5px auto 10px; border: 1px solid #d4af37; 
            border-radius: 15px; background: rgba(0, 0, 0, 0.96); backdrop-filter: blur(15px); overflow: hidden; z-index: 10;
            display: flex; flex-direction: column;
        }
        #settings-toggle { 
            width: 100%; padding: 14px; background: rgba(212, 175, 55, 0.2); color: #d4af37; 
            border: none; font-weight: bold; cursor: pointer; font-size: 0.95rem; font-family: inherit;
        }
        
        #settings-content { 
            max-height: 0; 
            overflow-y: auto; 
            transition: max-height 0.4s ease-in-out; 
            -webkit-overflow-scrolling: touch;
        }
        #settings-content.open { 
            max-height: 70vh; 
            padding: 20px 15px 100px 15px; 
        }

        input[type="text"], select, input[type="number"] { 
            background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; text-align: center; font-size: 16px; outline: none; font-family: inherit;
        }

        .section-box { border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 15px; margin-bottom: 15px; }
        .option-label { font-size: 0.8rem; text-transform: uppercase; display: block; margin-bottom: 10px; text-align: center; letter-spacing: 1.5px; color: #d4af37; font-weight: bold; }
        
        .toggle-row { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 0.95rem; margin-bottom: 12px; cursor: pointer; color: #d4af37; }
        input[type="checkbox"] { accent-color: #d4af37; transform: scale(1.2); }

        .prayer-item { display: flex; justify-content: space-between; align-items: center; background: rgba(212,175,55,0.07); padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; border: 1px solid rgba(212,175,55,0.3); color: #d4af37; }
        .del-btn { color: #ff4444; font-weight: bold; padding: 5px 10px; cursor: pointer; font-size: 1.2rem; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        #bead-container { 
            width: 58vw; height: 58vw; max-width: 210px; max-height: 210px; border-radius: 50%; 
            background: radial-gradient(circle, #2a2a2a 0%, #000 100%); border: 3px solid #d4af37; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.9); transition: transform 0.05s;
        }
        #bead-container:active { transform: scale(0.96); border-color: #fff; }
        #current-count { font-size: 3.5rem; font-weight: bold; line-height: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .info-bar { font-size: 0.8rem; opacity: 0.7; text-align: center; display: flex; gap: 15px; justify-content: center; align-items: center; margin-top: 10px; }
        .dim-btn { background: #d4af37; color: #000; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; margin-top: 5px; }
        .reset-btn { background: transparent; border: 1px solid rgba(212,175,55,0.4); color: #d4af37; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="splash-screen"><img src="icon.png" alt="App Icon"></div>
    <div id="dim-overlay" onclick="countBead()"></div>

    <div id="prayer-area">
        <div id="prayer-text">Φόρτωση...</div>
    </div>

    <div class="settings-container">
        <button id="settings-toggle" onclick="toggleSettings()">⚙ ΡΥΘΜΙΣΕΙΣ <span id="arrow">▼</span></button>
        <div id="settings-content">
            
            <div class="section-box">
                <span class="option-label">Κανόνας</span>
                <select id="knot-select" onchange="updateSettings()">
                    <option value="33">33 κόμποι</option>
                    <option value="100">100 κόμποι</option>
                    <option value="custom">Επιλογή κόμπων</option>
                    <option value="timer">Χρόνος (λεπτά)</option>
                    <option value="free">Χωρίς στόχο</option>
                </select>
                <input type="number" id="custom-input" style="display:none;" placeholder="Τιμή..." oninput="updateSettings()">
            </div>

            <div class="section-box">
                <span class="option-label">Δόνηση</span>
                <label class="toggle-row"><input type="checkbox" id="vib-on" onclick="saveVib(this,'vib')"> Σε κάθε κόμπο</label>
                <label class="toggle-row"><input type="checkbox" id="vib-off" onclick="onlyOne(this,'vib')"> Μόνο στον τερματισμό</label>
            </div>

            <div class="section-box" style="border-bottom:none;">
                <span class="option-label">Νέα Προσευχή</span>
                <div style="display:flex; gap:8px; margin-bottom:20px;">
                    <input type="text" id="new-prayer-input" placeholder="Κείμενο..." style="margin:0;">
                    <button onclick="addNewPrayer()" style="background:#d4af37; border:none; border-radius:8px; padding:0 20px; font-weight:bold; color:#000; font-size:1.3rem;">+</button>
                </div>
                <span class="option-label" style="font-size:0.75rem; opacity:0.8; margin-bottom:15px;">Λίστα Προσευχών</span>
                <div id="prayers-list-edit"></div>
            </div>
        </div>
    </div>

    <div id="main-area">
        <div id="bead-container" onclick="countBead()">
            <span id="current-count">33</span>
            <span id="label-text" style="font-size:0.7rem; opacity:0.6; margin-top:5px; letter-spacing: 1px;">ΥΠΟΛΟΙΠΟ</span>
        </div>
        <button class="dim-btn" onclick="setDim(true)">Σκοτεινή Οθόνη</button>
        
        <div class="info-bar">
            <div>ΣΥΝΟΛΟ: <span id="total">0</span></div>
            <div>ΚΥΚΛΟΙ: <span id="cycles">0</span></div>
            <div>ΧΡΟΝΟΣ: <span id="session-timer">00:00:00</span></div>
        </div>
        
        <div style="text-align:center;">
            <button class="reset-btn" onclick="resetAll()">ΜΗΔΕΝΙΣΜΟΣ</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        let count = 0, total = 0, target = 33, mode = 'knots', timerSeconds = 0, timerInterval = null, cycles = 0;
        let pIndex = 0, touchStartX = 0, touchStartY = 0;
        
        // Session Timer Variables
        let startTime = null;
        let sessionInterval = null;

        const defaultPrayers = ["Κύριε Ἰησοῦ Χριστέ,<br>ἐλέησόν με", "Ὑπεραγία Θεοτόκε,<br>σῶσον ἡμᾶς", "Ἅγιε τοῦ Θεοῦ,<br>πρέσβευε ὑπὲρ ἡμῶν"];
        let prayers = JSON.parse(localStorage.getItem('my_prayers')) || [...defaultPrayers];

        function toggleSettings() {
            const c = document.getElementById('settings-content');
            c.classList.toggle('open');
            document.getElementById('arrow').innerText = c.classList.contains('open') ? '▲' : '▼';
            if(c.classList.contains('open')) renderPrayerList();
        }

        function addNewPrayer() {
            const input = document.getElementById('new-prayer-input');
            const val = input.value.trim();
            if (val) { prayers.push(val); savePrayers(); input.value = ''; renderPrayerList(); }
        }

        function removePrayer(index) {
            if (prayers.length <= 1) return;
            prayers.splice(index, 1);
            if (pIndex >= prayers.length) pIndex = 0;
            savePrayers(); renderPrayerList(); updatePrayerDisplay();
        }

        function renderPrayerList() {
            const list = document.getElementById('prayers-list-edit');
            list.innerHTML = prayers.map((p, i) => `<div class="prayer-item"><span>${p.replace('<br>', ' ')}</span><span class="del-btn" onclick="removePrayer(${i})">✕</span></div>`).join('');
        }

        function savePrayers() { localStorage.setItem('my_prayers', JSON.stringify(prayers)); }
        
        function saveVib(checkbox, group) {
            const list = ['vib-on', 'vib-off'];
            list.forEach(id => { if(document.getElementById(id) !== checkbox) document.getElementById(id).checked = false; });
            localStorage.setItem('vib_on', document.getElementById('vib-on').checked);
            localStorage.setItem('vib_off', document.getElementById('vib-off').checked);
        }

        function setDim(show) { document.getElementById('dim-overlay').style.display = show ? 'block' : 'none'; }

        // Session Timer Logic
        function startSessionTimer() {
            if (!startTime) {
                startTime = Date.now();
                localStorage.setItem('session_start', startTime);
            }
            if (!sessionInterval) {
                sessionInterval = setInterval(updateSessionUI, 1000);
            }
        }

        function updateSessionUI() {
            if (!startTime) return;
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            
            const h = Math.floor(diff / 3600).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            
            document.getElementById('session-timer').innerText = `${h}:${m}:${s}`;
        }

        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; }, {passive: true});
        document.addEventListener('touchend', e => {
            let diffX = e.changedTouches[0].screenX - touchStartX;
            let diffY = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(diffX) > 50 && Math.abs(diffY) < 100) {
                setDim(false);
                if (e.target.closest('#prayer-area') || e.target.closest('#main-area')) {
                    pIndex = diffX > 0 ? (pIndex > 0 ? pIndex - 1 : prayers.length - 1) : (pIndex < prayers.length - 1 ? pIndex + 1 : 0);
                    updatePrayerDisplay();
                }
            }
        }, {passive: true});

        function updatePrayerDisplay() { document.getElementById('prayer-text').innerHTML = prayers[pIndex]; }

        function multiVibrate(times) {
            if (!navigator.vibrate) return;
            let pattern = [];
            for(let i=0; i<times; i++) {
                pattern.push(400); 
                if(i < times - 1) pattern.push(200); 
            }
            navigator.vibrate(pattern);
        }

        function countBead() {
            startSessionTimer(); // Ξεκινάει το χρονόμετρο με το πρώτο πάτημα
            const vOn = document.getElementById('vib-on').checked, vOff = document.getElementById('vib-off').checked;

            if (mode === 'timer' && !timerInterval && timerSeconds > 0) {
                timerInterval = setInterval(() => { 
                    timerSeconds--; 
                    if (timerSeconds <= 0) { 
                        clearInterval(timerInterval); 
                        timerInterval = null; 
                        cycles++;
                        if (vOn || vOff) multiVibrate(cycles); 
                    } 
                    updateUI(); 
                }, 1000);
            }

            total++;
            if (mode === 'knots') {
                count++;
                if (target > 0 && count === target) {
                    cycles++;
                    if (vOn || vOff) multiVibrate(cycles);
                    count = 0;
                } else {
                    if (vOn) navigator.vibrate(60);
                }
            } else {
                if (vOn) navigator.vibrate(60);
            }
            updateUI();
        }

        function updateUI() {
            const d = document.getElementById('current-count');
            const lbl = document.getElementById('label-text');
            if (mode === 'timer') {
                d.innerText = `${Math.floor(timerSeconds/60)}:${(timerSeconds%60).toString().padStart(2,'0')}`;
                lbl.innerText = "ΧΡΟΝΟΣ";
            } else {
                d.innerText = (target > 0) ? Math.max(0, target - count) : total;
                lbl.innerText = (target > 0) ? "ΥΠΟΛΟΙΠΟ" : "ΣΥΝΟΛΟ";
            }
            document.getElementById('total').innerText = total;
            document.getElementById('cycles').innerText = cycles;
        }

        function updateSettings() {
            const s = document.getElementById('knot-select'), c = document.getElementById('custom-input');
            mode = (s.value === 'timer') ? 'timer' : 'knots';
            c.style.display = (s.value === 'custom' || s.value === 'timer') ? 'block' : 'none';
            
            localStorage.setItem('last_rule', s.value);
            localStorage.setItem('last_custom_val', c.value);

            if (mode === 'timer') { timerSeconds = (parseInt(c.value) || 0) * 60; } 
            else { target = s.value === 'free' ? 0 : (s.value === 'custom' ? parseInt(c.value)||0 : parseInt(s.value)); }
            resetAll();
        }

        function resetAll() { 
            count = 0; total = 0; cycles = 0; 
            startTime = null; 
            localStorage.removeItem('session_start');
            if(sessionInterval) { clearInterval(sessionInterval); sessionInterval = null; }
            document.getElementById('session-timer').innerText = "00:00:00";
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; } 
            updateUI(); 
        }

        window.addEventListener('load', () => {
            updatePrayerDisplay();
            document.getElementById('vib-on').checked = localStorage.getItem('vib_on') === 'true';
            document.getElementById('vib-off').checked = localStorage.getItem('vib_off') === 'true';

            const lastRule = localStorage.getItem('last_rule');
            const lastCustomVal = localStorage.getItem('last_custom_val');
            if (lastRule) {
                document.getElementById('knot-select').value = lastRule;
                if (lastCustomVal) document.getElementById('custom-input').value = lastCustomVal;
                updateSettings();
            }

            // Ανάκτηση χρονομέτρου συνεδρίας αν υπήρχε
            const savedStart = localStorage.getItem('session_start');
            if (savedStart) {
                startTime = parseInt(savedStart);
                startSessionTimer();
            }
            
            setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800); }, 2500);
        });
    </script>
</body>
</html>
