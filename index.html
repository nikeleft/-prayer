<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Κομποσκοίνι">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #0f0f0f; 
            color: #d4af37; 
            font-family: 'Times New Roman', Times, serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            touch-action: manipulation; 
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        #splash-screen img { max-width: 80%; max-height: 80%; object-fit: contain; }

        #dim-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000;
            z-index: 9000;
            display: none;
            cursor: pointer;
        }

        #prayer-text { font-size: 1.8rem; text-align: center; margin-bottom: 20px; padding: 0 20px; min-height: 4.5rem; line-height: 1.3; color: #d4af37; }
        
        .controls { 
            margin-bottom: 20px; 
            background: rgba(212, 175, 55, 0.05); 
            padding: 15px; 
            border-radius: 15px; 
            width: 85%; 
            max-width: 320px; 
            border: 1px solid #d4af37; 
        }

        select, input[type="number"] { 
            background: #1a1a1a; 
            color: #d4af37; 
            border: 1px solid #d4af37; 
            padding: 12px; 
            border-radius: 10px; 
            width: 100%; 
            font-size: 1.1rem; 
            font-family: inherit; 
            margin-bottom: 10px; 
            outline: none;
        }

        .vibration-toggle { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.95rem; 
            color: #d4af37; 
            margin-top: 8px;
            cursor: pointer;
        }

        input[type="radio"] { accent-color: #d4af37; transform: scale(1.2); }

        #bead-container { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            border: 2px solid #d4af37; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 10px 50px rgba(0,0,0,0.8); 
            transition: transform 0.05s ease; 
        }

        #bead-container:active { transform: scale(0.96); border-color: #fff; }
        .cross-icon { width: 70px; height: 90px; fill: #d4af37; margin-bottom: 5px; }
        #current-count { font-size: 3.5rem; font-weight: bold; color: #d4af37; line-height: 1; }
        #target-label { font-size: 0.8rem; color: #d4af37; opacity: 0.6; letter-spacing: 2px; margin-top: 5px; }

        .dim-btn {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        #stats { margin-top: 20px; text-align: center; font-size: 0.9rem; color: #d4af37; }
        #timer-display { font-size: 1.2rem; margin-bottom: 5px; font-weight: bold; opacity: 0.9; }
        .reset-btn { margin-top: 10px; background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 8px 20px; border-radius: 20px; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; }
        
        .goal-reached { border-color: #fff !important; box-shadow: 0 0 60px rgba(212, 175, 55, 0.5) !important; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="icon.png" alt="Splash Icon">
    </div>

    <div id="dim-overlay" onclick="countBead()" ontouchmove="handleSwipe(event)"></div>

    <div id="prayer-text">Κύριε Ἰησοῦ Χριστέ, ἐλέησόν με</div>

    <div class="controls">
        <select id="knot-select" onchange="updateSettings()">
            <option value="33">33 κόμποι</option>
            <option value="100">100 κόμποι</option>
            <option value="300">300 κόμποι</option>
            <option value="custom">Επιλογή αριθμού</option>
            <option value="free">Χωρίς στόχο</option>
        </select>
        <input type="number" id="custom-input" placeholder="Αριθμός..." style="display:none;" oninput="updateSettings()">

        <div class="vibration-options">
            <label class="vibration-toggle">
                <input type="radio" name="vib" id="vib-on" checked> Δόνηση σε κάθε κόμπο
            </label>
            <label class="vibration-toggle">
                <input type="radio" name="vib" id="vib-off"> Μόνο στον τερματισμό
            </label>
        </div>
        
        <button class="dim-btn" onclick="toggleDim(true)">Χαμηλός Φωτισμός</button>
    </div>

    <div id="bead-container" onclick="countBead()">
        <svg class="cross-icon" viewBox="0 0 24 24"><path d="M10 2h4v5h5v4h-5v11h-4v-11h-5v-4h5z"/></svg>
        <span id="current-count">33</span>
        <span id="target-label">ΥΠΟΛΟΙΠΟ</span>
    </div>

    <div id="stats">
        <div id="timer-display">Χρόνος: 00:00</div>
        ΣΥΝΟΛΟ: <span id="total">0</span> | ΚΥΚΛΟΙ: <span id="cycles">0</span><br>
        <button class="reset-btn" onclick="resetAll()">Μηδενισμός</button>
    </div>

    <script>
        let count = 0, total = 0, cycles = 0, target = 33, wakeLock = null;
        let touchStartY = 0;
        
        // Timer variables
        let startTime, timerInterval;
        let timerRunning = false;

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 3000);
        });

        document.addEventListener('touchstart', async (e) => {
            touchStartY = e.touches[0].clientY;
            if (!wakeLock && 'wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }, { passive: false });

        function toggleDim(show) {
            document.getElementById('dim-overlay').style.display = show ? 'block' : 'none';
        }

        function handleSwipe(e) {
            let touchEndY = e.touches[0].clientY;
            if (Math.abs(touchStartY - touchEndY) > 50) toggleDim(false);
        }

        function startTimer() {
            if (!timerRunning) {
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
                timerRunning = true;
            }
        }

        function updateTimer() {
            const now = Date.now();
            const diff = now - startTime;
            const mins = Math.floor(diff / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer-display').innerText = 
                `Χρόνος: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
        }

        function updateSettings() {
            const s = document.getElementById('knot-select'), c = document.getElementById('custom-input');
            c.style.display = (s.value === 'custom') ? 'block' : 'none';
            target = (s.value === 'free') ? 0 : (s.value === 'custom' ? (parseInt(c.value) || 0) : parseInt(s.value));
            resetCurrent();
        }

        function countBead() {
            if (total === 0) startTimer(); // Start timer on first tap
            
            count++; total++;
            const vibEvery = document.getElementById('vib-on').checked;

            if (navigator.vibrate) {
                if (target > 0 && count === target) {
                    cycles++;
                    let pattern = [];
                    for(let i=0; i < cycles; i++) {
                        pattern.push(300); if(i < cycles - 1) pattern.push(200);
                    }
                    navigator.vibrate(pattern);
                    document.getElementById('bead-container').classList.add('goal-reached');
                } else if (vibEvery) {
                    navigator.vibrate(60);
                }
            }

            if (target > 0 && count > target) {
                count = 1;
                document.getElementById('bead-container').classList.remove('goal-reached');
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('current-count').innerText = (target === 0) ? count : (target - count < 0 ? 0 : target - count);
            document.getElementById('target-label').innerText = (target === 0) ? "ΕΛΕΥΘΕΡΟ" : "ΥΠΟΛΟΙΠΟ";
            document.getElementById('total').innerText = total;
            document.getElementById('cycles').innerText = cycles;
        }

        function resetCurrent() { count = 0; document.getElementById('bead-container').classList.remove('goal-reached'); updateUI(); }
        
        function resetAll() { 
            total = 0; 
            cycles = 0; 
            stopTimer();
            document.getElementById('timer-display').innerText = "Χρόνος: 00:00";
            resetCurrent(); 
        }
        
        updateUI();
    </script>
</body>
</html>
