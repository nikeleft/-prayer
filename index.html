<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <style>
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f0f0f;
            color: #d4af37;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        #prayer-text {
            font-size: 1.9rem;
            text-align: center;
            margin-bottom: 20px;
            padding: 0 15px;
            min-height: 4.5rem;
            line-height: 1.3;
            color: #d4af37;
            font-weight: 500;
        }

        .controls {
            margin-bottom: 20px;
            background: rgba(212, 175, 55, 0.05);
            padding: 15px;
            border-radius: 12px;
            width: 88%;
            max-width: 300px;
            box-sizing: border-box;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        select, input[type="number"] {
            background: #1a1a1a;
            color: #d4af37;
            border: 1px solid #3d3d3d;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            width: 100%;
            font-size: 1.1rem;
            font-family: inherit;
        }

        .vibration-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }

        .vibration-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            color: #999;
            cursor: pointer;
            position: relative;
        }

        .vibration-toggle input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .checkmark {
            height: 20px;
            width: 20px;
            background-color: transparent;
            border: 2px solid #d4af37;
            border-radius: 50%;
            display: inline-block;
            position: relative;
        }

        .vibration-toggle input:checked ~ .checkmark:after {
            content: "";
            position: absolute;
            display: block;
            top: 4px;
            left: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #d4af37;
        }

        .vibration-toggle input:checked ~ span:not(.checkmark) {
            color: #d4af37;
        }

        #bead-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border: 2px solid #d4af37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            transition: transform 0.05s ease;
        }

        #bead-container:active {
            transform: scale(0.95);
            border-color: #ffffff;
        }

        .classic-cross-svg {
            width: 90px;
            height: 110px;
            fill: #d4af37;
            margin-bottom: 2px;
            pointer-events: none;
        }

        #current-count {
            font-size: 3.5rem;
            font-weight: bold;
            color: #d4af37;
            margin-top: 0px;
            pointer-events: none;
        }

        #target-display {
            font-size: 0.9rem;
            opacity: 0.6;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .goal-reached {
            border-color: #ffffff !important;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4) !important;
        }

        #stats { margin-top: 25px; text-align: center; }
        
        .reset-btn {
            background: transparent;
            border: 1px solid #444;
            color: #777;
            padding: 10px 22px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="prayer-text">Κύριε Ἰησοῦ Χριστέ, ἐλέησόν με</div>

    <div class="controls">
        <select id="knot-select" onchange="handleSelectChange()">
            <option value="33">33 κόμποι</option>
            <option value="100">100 κόμποι</option>
            <option value="300">300 κόμποι</option>
            <option value="custom">Custom (ὁρίστε ἀριθμό)</option>
            <option value="free">Ἐλεύθερο (χωρίς στόχο)</option>
        </select>
        <input type="number" id="custom-input" style="display:none; margin-top:10px;" placeholder="Αριθμός..." oninput="updateTarget()">

        <div class="vibration-options">
            <label class="vibration-toggle">
                <input type="radio" name="vib-mode" id="vib-every" checked> 
                <span class="checkmark"></span>
                <span>Δόνηση σὲ κάθε κόμπο</span>
            </label>
            <label class="vibration-toggle">
                <input type="radio" name="vib-mode" id="vib-end"> 
                <span class="checkmark"></span>
                <span>Δόνηση μόνο στὸν τερματισμό</span>
            </label>
        </div>
    </div>

    <div id="bead-container" onclick="countBead()">
        <svg class="classic-cross-svg" viewBox="0 0 24 24">
            <path d="M10 2h4v5h5v4h-5v11h-4v-11h-5v-4h5z"/>
        </svg>
        <span id="current-count">33</span>
        <span id="target-display">ΥΠΟΛΟΙΠΟ</span>
    </div>

    <div id="stats">
        <div style="margin-bottom:10px; font-size: 1rem; opacity: 0.5;">
            ΣΥΝΟΛΙΚΑ: <span id="total-count">0</span> | ΚΥΚΛΟΙ: <span id="cycle-count">0</span>
        </div>
        <button class="reset-btn" onclick="resetCounter()">Μηδενισμός</button>
    </div>

    <script>
        let count = 0; 
        let total = 0;
        let cycles = 0;
        let target = 33;
        let wakeLock = null;

        document.addEventListener('touchstart', function() {
            if (!wakeLock) {
                if (navigator.vibrate) navigator.vibrate(5);
                requestWakeLock();
            }
        }, {once: true}); 

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } 
            catch (err) { console.log("WakeLock error"); }
        }

        function handleSelectChange() {
            const select = document.getElementById('knot-select');
            const customInput = document.getElementById('custom-input');
            customInput.style.display = (select.value === 'custom') ? 'block' : 'none';
            if (select.value === 'free') target = 0;
            else if (select.value === 'custom') target = parseInt(customInput.value) || 0;
            else target = parseInt(select.value);
            resetCycle();
        }

        function updateTarget() {
            target = parseInt(document.getElementById('custom-input').value) || 0;
            resetCycle();
        }

        function countBead() {
            count++;
            total++;
            const vibEvery = document.getElementById('vib-every').checked;
            
            if (navigator.vibrate) {
                if (target > 0 && count === target) {
                    cycles++;
                    let pattern = [];
                    for(let i=0; i<cycles; i++) {
                        pattern.push(300);
                        if(i < cycles - 1) pattern.push(150);
                    }
                    navigator.vibrate(pattern);
                } 
                else if (vibEvery) {
                    navigator.vibrate([75]);
                }
            }

            if (target > 0 && count === target) document.getElementById('bead-container').classList.add('goal-reached');
            if (target > 0 && count > target) { resetCycle(); count = 1; }
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('current-count');
            const label = document.getElementById('target-display');
            if (target === 0) { display.innerText = count; label.innerText = "ΕΛΕΥΘΕΡΟ"; } 
            else { display.innerText = target - count; label.innerText = "ΥΠΟΛΟΙΠΟ"; }
            document.getElementById('total-count').innerText = total;
            document.getElementById('cycle-count').innerText = cycles;
        }

        function resetCycle() {
            count = 0;
            document.getElementById('bead-container').classList.remove('goal-reached');
            updateDisplay();
        }

        function resetCounter() { total = 0; cycles = 0; resetCycle(); }
        updateDisplay();
    </script>
</body>
</html>
