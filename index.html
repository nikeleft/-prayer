<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    
    <link rel="manifest" href="manifest.json">

    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: #0a0a0a;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: #d4af37; font-family: 'Times New Roman', serif; 
            display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f0f0f; display: flex; align-items: center; justify-content: center; 
            z-index: 99999; transition: opacity 0.5s ease-out; pointer-events: none;
        }

        #dim-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 90000; display: none; }

        #prayer-area { width: 100%; text-align: center; padding-top: 40px; flex-shrink: 0; min-height: 110px; cursor: pointer; }
        #prayer-text { font-size: 1.6rem; line-height: 1.3; min-height: 4.5rem; display: flex; align-items: center; justify-content: center; padding: 0 20px; color: #d4af37; font-weight: 500; }

        .panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; 
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px);
            border-top: 2px solid #d4af37; border-radius: 30px 30px 0 0;
            z-index: 10000; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px; overflow-y: auto;
        }
        .panel.open { bottom: 0; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 15px; }
        .close-panel { font-size: 1.5rem; cursor: pointer; color: #d4af37; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        
        #bead-container { 
            width: 58vw; height: 58vw; max-width: 210px; max-height: 210px; border-radius: 50%; 
            background: radial-gradient(circle, #252525 0%, #000 100%); border: 4px solid #d4af37; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.9); transition: transform 0.05s;
        }
        #bead-container:active { transform: scale(0.95); }
        #current-count { font-size: 3.8rem; font-weight: bold; line-height: 1; margin: 0; }

        .nav-btn { background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; color: #d4af37; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        input, select { background: #1a1a1a; color: #fff; border: 1px solid #d4af37; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 15px; font-family: inherit; font-size: 1rem; outline: none; }
        
        .info-bar { width: 100%; max-width: 380px; display: flex; justify-content: space-around; align-items: center; padding: 12px 0; border-top: 1px solid rgba(212, 175, 55, 0.1); font-size: 0.7rem; }
        .info-value { display: block; font-weight: bold; font-size: 0.95rem; color: #fff; margin-top: 4px; }

        .reset-btn { background: transparent; border: 1px solid rgba(212,175,55,0.3); color: #d4af37; padding: 10px 25px; border-radius: 25px; font-size: 0.95rem; margin-top: 10px; font-weight: bold; cursor: pointer; }
        
        .prayer-item { display: flex; justify-content: space-between; align-items: center; background: rgba(212,175,55,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(212,175,55,0.2); }
    </style>
</head>
<body>

    <div id="splash-screen"><h2 style="color:#d4af37;">†</h2></div>
    <div id="dim-overlay"></div>

    <div id="prayer-area">
        <div id="prayer-text">Φόρτωση...</div>
    </div>

    <div id="main-area">
        <div id="bead-container" onclick="countBead()">
            <span id="current-count">0</span>
        </div>

        <div style="display:flex; gap:10px; margin-top:5px;">
            <button class="nav-btn" onclick="togglePanel('settings-panel')">⚙ ΚΑΝΟΝΑΣ</button>
            <button class="nav-btn" onclick="togglePanel('prayers-panel')">📖 ΠΡΟΣΕΥΧΕΣ</button>
            <button class="nav-btn" style="background:#000; font-size:1.2rem; padding:5px 15px;" onclick="setDim(true)">🌙</button>
        </div>

        <div class="info-bar">
            <div style="text-align:center;">ΣΥΝΟΛΟ <span id="total" class="info-value">0</span></div>
            <div style="text-align:center;">ΚΥΚΛΟΙ <span id="cycles" class="info-value">0</span></div>
            <div style="text-align:center;">ΧΡΟΝΟΣ <span id="session-timer" class="info-value">00:00:00</span></div>
        </div>
        
        <button class="reset-btn" onclick="resetAll()">ΒΑΖΩ ΑΡΧΗ</button>
    </div>

    <div id="settings-panel" class="panel">
        <div class="panel-header"><h3>Κανόνας</h3><span class="close-panel" onclick="togglePanel('settings-panel')">✕</span></div>
        <label>Τρόπος Προσευχής</label>
        <select id="knot-select" onchange="updateSettings()">
            <option value="33">33 κόμποι</option>
            <option value="100">100 κόμποι</option>
            <option value="custom">Επιλογή κόμπων...</option>
            <option value="free">Χωρίς στόχο</option>
        </select>
        <input type="number" id="custom-input" style="display:none;" placeholder="Αριθμός κόμπων..." oninput="updateSettings()">
        
        <label style="display:block; margin: 20px 0 10px;">Δόνηση</label>
        <label style="display:flex; align-items:center; gap:10px; margin-bottom:15px;"><input type="checkbox" id="vib-on" onclick="saveVib('on')"> Σε κάθε κόμπο</label>
        <label style="display:flex; align-items:center; gap:10px;"><input type="checkbox" id="vib-off" onclick="saveVib('off')"> Μόνο στον τερματισμό</label>
    </div>

    <div id="prayers-panel" class="panel">
        <div class="panel-header"><h3>Προσευχές</h3><span class="close-panel" onclick="togglePanel('prayers-panel')">✕</span></div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="new-prayer-input" placeholder="Νέα προσευχή..." style="margin:0;">
            <button onclick="addNewPrayer()" style="background:#d4af37; border:none; border-radius:12px; padding:0 15px; font-weight:bold;">+</button>
        </div>
        <div id="prayers-list-edit"></div>
    </div>

    <script>
        // SERVICE WORKER REGISTRATION (Για την Εγκατάσταση)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {
                // Fallback αν δεν υπάρχει το sw.js
                navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGU9Pnt9KTs=');
            });
        }

        // ΜΕΤΑΒΛΗΤΕΣ & STORAGE
        let count = parseInt(localStorage.getItem('count')) || 0;
        let total = parseInt(localStorage.getItem('total')) || 0;
        let cycles = parseInt(localStorage.getItem('cycles')) || 0;
        let target = parseInt(localStorage.getItem('target')) || 33;
        let targetType = localStorage.getItem('targetType') || 'knots';
        
        const defaultPrayers = ["Κύριε Ἰησοῦ Χριστέ,<br>ἐλέησόν με", "Ὑπεραγία Θεοτόκε,<br>σῶσον ἡμᾶς"];
        let prayers = JSON.parse(localStorage.getItem('my_prayers')) || [...defaultPrayers];
        let pIndex = 0;

        let isPaused = true, startTime = null, elapsed = 0, timerInterval;

        function saveState() {
            localStorage.setItem('count', count);
            localStorage.setItem('total', total);
            localStorage.setItem('cycles', cycles);
            localStorage.setItem('target', target);
            localStorage.setItem('targetType', targetType);
        }

        function countBead() {
            if(isPaused) startTimer();
            count++; total++;
            if(targetType === 'knots' && target > 0 && count >= target) {
                cycles++; count = 0;
                navigator.vibrate([300, 100, 300]);
            } else if(localStorage.getItem('vib_on') === 'true') {
                navigator.vibrate(50);
            }
            saveState();
            updateUI();
        }

        function updateUI() {
            document.getElementById('current-count').innerText = (targetType === 'knots' && target > 0) ? (target - count) : total;
            document.getElementById('total').innerText = total;
            document.getElementById('cycles').innerText = cycles;
        }

        function startTimer() {
            if(!isPaused) return;
            isPaused = false; startTime = Date.now();
            timerInterval = setInterval(() => {
                let s = Math.floor((elapsed + (Date.now() - startTime)) / 1000);
                let h = Math.floor(s/3600).toString().padStart(2,'0');
                let m = Math.floor((s%3600)/60).toString().padStart(2,'0');
                let sec = (s%60).toString().padStart(2,'0');
                document.getElementById('session-timer').innerText = `${h}:${m}:${sec}`;
            }, 1000);
        }

        function updateSettings() {
            const s = document.getElementById('knot-select');
            const ci = document.getElementById('custom-input');
            targetType = 'knots';
            if(s.value === 'free') target = 0;
            else if(s.value === 'custom') { ci.style.display = 'block'; target = parseInt(ci.value) || 33; }
            else { ci.style.display = 'none'; target = parseInt(s.value); }
            saveState();
            updateUI();
        }

        function saveVib(type) {
            if(type === 'on') {
                let val = document.getElementById('vib-on').checked;
                localStorage.setItem('vib_on', val);
                if(val) { document.getElementById('vib-off').checked = false; localStorage.setItem('vib_off', false); }
            } else {
                let val = document.getElementById('vib-off').checked;
                localStorage.setItem('vib_off', val);
                if(val) { document.getElementById('vib-on').checked = false; localStorage.setItem('vib_on', false); }
            }
        }

        function resetAll() {
            if(confirm("Θέλετε να μηδενίσετε την πρόοδο;")) {
                count = 0; total = 0; cycles = 0; elapsed = 0;
                localStorage.clear();
                location.reload();
            }
        }

        function setDim(show) { 
            document.getElementById('dim-overlay').style.display = show ? 'block' : 'none';
            if(show) startTimer();
        }

        // Swipe για αλλαγή προσευχής & κλείσιμο σκότους
        let sX = 0;
        document.body.addEventListener('touchstart', e => sX = e.touches[0].clientX);
        document.body.addEventListener('touchend', e => {
            let diff = sX - e.changedTouches[0].clientX;
            if(Math.abs(diff) > 60) {
                if(document.getElementById('dim-overlay').style.display === 'block') setDim(false);
                else {
                    pIndex = diff > 0 ? (pIndex + 1) % prayers.length : (pIndex - 1 + prayers.length) % prayers.length;
                    document.getElementById('prayer-text').innerHTML = prayers[pIndex];
                }
            }
        });

        function togglePanel(id) { document.getElementById(id).classList.toggle('open'); if(id==='prayers-panel') renderPrayers(); }

        function addNewPrayer() {
            let val = document.getElementById('new-prayer-input').value;
            if(val) { prayers.push(val); localStorage.setItem('my_prayers', JSON.stringify(prayers)); renderPrayers(); }
        }

        function renderPrayers() {
            document.getElementById('prayers-list-edit').innerHTML = prayers.map((p, i) => `
                <div class="prayer-item"><span>${p}</span><button onclick="prayers.splice(${i},1);localStorage.setItem('my_prayers', JSON.stringify(prayers));renderPrayers();">✕</button></div>
            `).join('');
        }

        window.onload = () => {
            setTimeout(() => document.getElementById('splash-screen').style.opacity='0', 500);
            document.getElementById('prayer-text').innerHTML = prayers[0];
            document.getElementById('vib-on').checked = localStorage.getItem('vib_on') === 'true';
            document.getElementById('vib-off').checked = localStorage.getItem('vib_off') === 'true';
            document.getElementById('knot-select').value = target === 0 ? 'free' : (target === 33 || target === 100 ? target : 'custom');
            updateUI();
        };
    </script>
</body>
</html>
