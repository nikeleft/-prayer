<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #000; color: #d4af37; font-family: serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* SPLASH - ΜΟΝΟ ΤΟ ICON.PNG ΧΩΡΙΣ ΣΤΑΥΡΟ */
        #splash { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #splash img { width: 150px; height: 150px; object-fit: contain; border: none; outline: none; }

        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #prayer { font-size: 1.5rem; height: 4rem; display: flex; align-items: center; margin-bottom: 20px; }
        
        #bead { width: 200px; height: 200px; border: 4px solid #d4af37; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: radial-gradient(circle, #222, #000); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #bead:active { transform: scale(0.96); }
        #count { font-size: 4rem; font-weight: bold; }

        .btn-row { display: flex; gap: 10px; margin: 20px 0; }
        .btn { background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; color: #d4af37; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .reset-btn { background: transparent; border: 1px solid #555; color: #d4af37; padding: 12px 30px; border-radius: 25px; margin-top: 20px; cursor: pointer; font-size: 1rem; }
        
        #stats { width: 100%; display: flex; justify-content: space-around; border-top: 1px solid #222; padding-top: 15px; font-size: 0.8rem; }
        .stat-val { display: block; font-size: 1.1rem; color: #fff; }

        #panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 50%; background: #111; border-top: 2px solid #d4af37; transition: 0.3s; padding: 20px; z-index: 500; }
        #panel.open { bottom: 0; }
    </style>
</head>
<body>

<div id="splash"><img src="icon.png" alt=""></div>

<div id="main">
    <div id="prayer">Κύριε Ἰησοῦ Χριστέ, ἐλέησόν με</div>
    
    <div id="bead" onclick="countBead()">
        <span id="count">0</span>
    </div>

    <div class="btn-row">
        <button class="btn" onclick="openPanel()">⚙ ΚΑΝΟΝΑΣ</button>
    </div>

    <div id="stats">
        <div>ΣΥΝΟΛΟ <span id="total" class="stat-val">0</span></div>
        <div>ΚΥΚΛΟΙ <span id="cycles" class="stat-val">0</span></div>
    </div>

    <button class="reset-btn" onclick="resetAll()">ΒΑΖΩ ΑΡΧΗ</button>
</div>

<div id="panel">
    <h3>Ρύθμιση Κανόνα</h3>
    <select id="targetSelect" onchange="setTarget(this.value)" style="width:100%; padding:15px; background:#222; color:#fff; border:1px solid #d4af37; border-radius:10px;">
        <option value="33">33 κόμποι</option>
        <option value="100">100 κόμποι</option>
        <option value="300">300 κόμποι</option>
    </select>
    <br><br>
    <button class="btn" onclick="openPanel()">ΚΛΕΙΣΙΜΟ</button>
</div>

<script>
    let c = 0, t = 0, cy = 0, target = parseInt(localStorage.getItem('target')) || 33;

    function updateUI() {
        document.getElementById('count').innerText = target - c;
        document.getElementById('total').innerText = t;
        document.getElementById('cycles').innerText = cy;
    }

    function countBead() {
        c++; t++;
        if(c >= target) { c = 0; cy++; navigator.vibrate([200, 100, 200]); }
        else { navigator.vibrate(40); }
        localStorage.setItem('target', target);
        updateUI();
    }

    // Η ΣΥΝΑΡΤΗΣΗ ΠΟΥ ΖΗΤΗΣΕΣ: ΧΩΡΙΣ ΕΡΩΤΗΣΗ
    function resetAll() {
        c = 0; t = 0; cy = 0;
        updateUI();
    }

    function setTarget(v) {
        target = parseInt(v);
        c = 0;
        localStorage.setItem('target', target);
        updateUI();
    }

    function openPanel() { document.getElementById('panel').classList.toggle('open'); }

    window.onload = () => {
        document.getElementById('targetSelect').value = target;
        updateUI();
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
        }, 1500);
    };
</script>

</body>
</html>
