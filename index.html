<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Κομποσκοίνι">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0a0a0a">

    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: #0a0a0a;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: #d4af37; font-family: 'Times New Roman', serif; 
            display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        /* SPLASH SCREEN FIX */
        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f0f0f; display: flex; align-items: center; justify-content: center; 
            z-index: 99999; transition: opacity 0.5s ease-out; pointer-events: none;
        }
        #splash-screen img { width: 200px; height: 200px; border-radius: 40px; border: 1px solid #d4af37; }

        #dim-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9000; display: none; }

        #prayer-area { width: 100%; text-align: center; padding-top: 50px; padding-bottom: 10px; flex-shrink: 0; }
        #prayer-text { font-size: 1.6rem; line-height: 1.3; min-height: 5rem; display: flex; align-items: center; justify-content: center; padding: 0 10px; color: #d4af37; }

        .settings-container { 
            width: 100%; max-width: 350px; margin: 5px auto 10px; border: 1px solid #d4af37; 
            border-radius: 15px; background: rgba(0, 0, 0, 0.96); backdrop-filter: blur(15px); overflow: hidden; z-index: 10;
        }
        #settings-toggle { 
            width: 100%; padding: 14px; background: rgba(212, 175, 55, 0.2); color: #d4af37; 
            border: none; font-weight: bold; cursor: pointer; font-family: inherit;
        }
        
        #settings-content { max-height: 0; overflow-y: auto; transition: max-height 0.4s ease-in-out; }
        #settings-content.open { max-height: 70vh; padding: 20px 15px; }

        input[type="text"], select, input[type="number"] { 
            background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; text-align: center; font-size: 16px; font-family: inherit;
        }

        .section-box { border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 15px; margin-bottom: 15px; }
        .option-label { font-size: 0.8rem; text-transform: uppercase; display: block; margin-bottom: 10px; text-align: center; color: #d4af37; font-weight: bold; }
        
        .toggle-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; color: #d4af37; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        #bead-container { 
            width: 55vw; height: 55vw; max-width: 200px; max-height: 200px; border-radius: 50%; 
            background: radial-gradient(circle, #2a2a2a 0%, #000 100%); border: 3px solid #d4af37; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #current-count { font-size: 3.5rem; font-weight: bold; }

        .info-bar { font-size: 0.8rem; text-align: center; display: flex; gap: 12px; justify-content: center; margin-top: 10px; opacity: 0.9; }
        .timer-container { display: flex; align-items: center; gap: 8px; background: rgba(212,175,55,0.1); padding: 4px 12px; border-radius: 12px; }
        #pause-btn { background: none; border: none; color: #d4af37; font-size: 1.1rem; cursor: pointer; }
        
        .dim-btn { background: #d4af37; color: #000; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; margin-top: 5px; text-transform: uppercase; font-size: 0.8rem;}
        .reset-btn { background: transparent; border: 1px solid rgba(212,175,55,0.4); color: #d4af37; padding: 6px 15px; border-radius: 20px; font-size: 0.7rem; margin-top: 10px; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="splash-screen"><img src="icon.png" onerror="this.style.display='none'"></div>
    <div id="dim-overlay" onclick="countBead()"></div>

    <div id="prayer-area">
        <div id="prayer-text">Φόρτωση...</div>
    </div>

    <div class="settings-container">
        <button id="settings-toggle" onclick="toggleSettings()">⚙ ΡΥΘΜΙΣΕΙΣ <span id="arrow">▼</span></button>
        <div id="settings-content">
            <div class="section-box">
                <span class="option-label">Κανόνας</span>
                <select id="knot-select" onchange="updateSettings()">
                    <option value="33">33 κόμποι</option>
                    <option value="100">100 κόμποι</option>
                    <option value="custom">Επιλογή κόμπων</option>
                    <option value="free">Χωρίς στόχο</option>
                </select>
                <input type="number" id="custom-input" style="display:none;" placeholder="Αριθμός..." oninput="updateSettings()">
            </div>
            <div class="section-box">
                <span class="option-label">Δόνηση</span>
                <label class="toggle-row"><input type="checkbox" id="vib-on" onclick="saveVib(this)"> Σε κάθε κόμπο</label>
                <label class="toggle-row"><input type="checkbox" id="vib-off" onclick="saveVib(this)"> Μόνο στον τερματισμό</label>
            </div>
        </div>
    </div>

    <div id="main-area">
        <div id="bead-container" onclick="countBead()">
            <span id="current-count">33</span>
            <span style="font-size:0.7rem; opacity:0.6;">ΥΠΟΛΟΙΠΟ</span>
        </div>
        <button class="dim-btn" onclick="setDim(true)">Σκοτεινή Οθόνη</button>
        
        <div class="info-bar">
            <div>ΣΥΝΟΛΟ: <span id="total">0</span></div>
            <div>ΚΥΚΛΟΙ: <span id="cycles">0</span></div>
            <div class="timer-container">
                <span id="session-timer">00:00:00</span>
                <button id="pause-btn" onclick="toggleTimer(event)">⏸</button>
            </div>
        </div>
        <button class="reset-btn" onclick="resetAll()">ΜΗΔΕΝΙΣΜΟΣ</button>
    </div>

    <script>
        // Emergency Splash Clear
        window.addEventListener('load', () => {
            setTimeout(() => {
                const ss = document.getElementById('splash-screen');
                if(ss) { ss.style.opacity = '0'; setTimeout(() => ss.remove(), 600); }
            }, 1500);
        });

        let count = 0, total = 0, target = 33, cycles = 0;
        let elapsedBeforePause = 0, startTime = null, sessionInterval = null, isPaused = true;
        let pIndex = 0;
        const prayers = ["Κύριε Ἰησοῦ Χριστέ,<br>ἐλέησόν με", "Ὑπεραγία Θεοτόκε,<br>σῶσον ἡμᾶς", "Ἅγιε τοῦ Θεοῦ,<br>πρέσβευε ὑπὲρ ἡμῶν"];

        function toggleSettings() {
            const c = document.getElementById('settings-content');
            c.classList.toggle('open');
            document.getElementById('arrow').innerText = c.classList.contains('open') ? '▲' : '▼';
        }

        function saveVib(checkbox) {
            document.getElementById('vib-on').checked = (checkbox.id === 'vib-on' && checkbox.checked);
            document.getElementById('vib-off').checked = (checkbox.id === 'vib-off' && checkbox.checked);
            localStorage.setItem('vib_on', document.getElementById('vib-on').checked);
            localStorage.setItem('vib_off', document.getElementById('vib-off').checked);
        }

        function setDim(show) { document.getElementById('dim-overlay').style.display = show ? 'block' : 'none'; }

        function toggleTimer(e) {
            if (e) e.stopPropagation();
            isPaused ? startTimer() : pauseTimer();
        }

        function startTimer() {
            if (!isPaused) return;
            isPaused = false;
            startTime = Date.now();
            sessionInterval = setInterval(updateSessionUI, 1000);
            document.getElementById('pause-btn').innerText = "⏸";
        }

        function pauseTimer() {
            if (isPaused) return;
            isPaused = true;
            elapsedBeforePause += Date.now() - startTime;
            clearInterval(sessionInterval);
            document.getElementById('pause-btn').innerText = "▶";
            localStorage.setItem('elapsed_time', elapsedBeforePause);
        }

        function updateSessionUI() {
            let ms = elapsedBeforePause + (isPaused ? 0 : (Date.now() - startTime));
            let s = Math.floor(ms / 1000);
            let h = Math.floor(s / 3600).toString().padStart(2, '0');
            let m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            let sec = (s % 60).toString().padStart(2, '0');
            document.getElementById('session-timer').innerText = `${h}:${m}:${sec}`;
        }

        function countBead() {
            if (isPaused) startTimer();
            total++;
            count++;
            if (target > 0 && count >= target) {
                cycles++;
                count = 0;
                navigator.vibrate([400, 200, 400]);
            } else if (document.getElementById('vib-on').checked) {
                navigator.vibrate(60);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('current-count').innerText = target > 0 ? (target - count) : total;
            document.getElementById('total').innerText = total;
            document.getElementById('cycles').innerText = cycles;
        }

        function updateSettings() {
            const s = document.getElementById('knot-select');
            const ci = document.getElementById('custom-input');
            ci.style.display = s.value === 'custom' ? 'block' : 'none';
            target = s.value === 'free' ? 0 : (s.value === 'custom' ? parseInt(ci.value)||33 : parseInt(s.value));
            localStorage.setItem('last_rule', s.value);
            resetAll();
        }

        function resetAll() {
            count = 0; total = 0; cycles = 0; elapsedBeforePause = 0;
            if(sessionInterval) clearInterval(sessionInterval);
            isPaused = true; startTime = null;
            document.getElementById('session-timer').innerText = "00:00:00";
            document.getElementById('pause-btn').innerText = "▶";
            updateUI();
        }

        // Init
        window.onload = () => {
            document.getElementById('prayer-text').innerHTML = prayers[0];
            document.getElementById('vib-on').checked = localStorage.getItem('vib_on') === 'true';
            document.getElementById('vib-off').checked = localStorage.getItem('vib_off') === 'true';
            const lr = localStorage.getItem('last_rule');
            if(lr) { document.getElementById('knot-select').value = lr; updateSettings(); }
        };
    </script>
</body>
</html>
