<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ψηφιακὸν Κομποσκοίνι</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: #0a0a0a;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: #d4af37; font-family: 'Times New Roman', serif; 
            display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f0f0f; display: flex; align-items: center; justify-content: center; 
            z-index: 99999; transition: opacity 0.5s ease-out; pointer-events: none;
        }
        #splash-screen img { width: 180px; height: 180px; border-radius: 40px; border: 1px solid #d4af37; }

        /* Dim Overlay: Μέτρηση με κλικ, Κλείσιμο με Swipe */
        #dim-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 90000; display: none; }

        #prayer-area { width: 100%; text-align: center; padding-top: 40px; flex-shrink: 0; min-height: 110px; }
        #prayer-text { font-size: 1.6rem; line-height: 1.3; min-height: 4.5rem; display: flex; align-items: center; justify-content: center; padding: 0 20px; color: #d4af37; font-weight: 500; }

        .panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; 
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px);
            border-top: 2px solid #d4af37; border-radius: 30px 30px 0 0;
            z-index: 10000; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px; overflow-y: auto;
        }
        .panel.open { bottom: 0; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 15px; }
        .close-panel { font-size: 1.5rem; cursor: pointer; color: #d4af37; }

        .nav-btn { background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; color: #d4af37; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        input, select { background: #1a1a1a; color: #fff; border: 1px solid #d4af37; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 15px; font-family: inherit; font-size: 1rem; outline: none; }
        
        .prayer-item { display: flex; justify-content: space-between; align-items: center; background: rgba(212,175,55,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(212,175,55,0.2); color: #d4af37; }
        .del-btn { color: #ff4444; font-size: 1.2rem; padding-left: 10px; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        #bead-container { 
            width: 52vw; height: 52vw; max-width: 190px; max-height: 190px; border-radius: 50%; 
            background: radial-gradient(circle, #252525 0%, #000 100%); border: 4px solid #d4af37; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.9); transition: transform 0.05s;
        }
        #bead-container:active { transform: scale(0.95); }
        #current-count { font-size: 3.2rem; font-weight: bold; }

        .info-bar { 
            width: 100%; max-width: 380px; display: flex; justify-content: space-around; align-items: center; 
            padding: 12px 0; border-top: 1px solid rgba(212, 175, 55, 0.1); font-size: 0.7rem;
        }
        .info-item { text-align: center; }
        .info-value { display: block; font-weight: bold; font-size: 0.95rem; color: #fff; margin-top: 4px; }

        .timer-box { background: rgba(212, 175, 55, 0.1); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(212,175,55,0.3); }
        #pause-btn { background: none; border: none; color: #d4af37; font-size: 1.1rem; cursor: pointer; }

        .bottom-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="splash-screen"><img src="icon.png" onerror="this.style.display='none'"></div>
    
    <div id="dim-overlay"></div>

    <div id="prayer-area">
        <div id="prayer-text">Φόρτωση...</div>
        <div style="font-size: 0.6rem; opacity: 0.4; margin-top: 8px;">Σύρετε δεξιά/αριστερά για αλλαγή</div>
    </div>

    <div id="main-area">
        <div id="bead-container" onclick="countBead()">
            <span id="current-count">33</span>
            <span style="font-size:0.65rem; opacity:0.6; letter-spacing:1px;">ΥΠΟΛΟΙΠΟ</span>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="togglePanel('settings-panel')">⚙ ΡΥΘΜΙΣΕΙΣ</button>
            <button class="nav-btn" onclick="togglePanel('prayers-panel')">📖 ΠΡΟΣΕΥΧΕΣ</button>
            <button class="nav-btn" style="background: #000; font-size: 1.2rem; padding: 5px 15px;" onclick="setDim(true)">🌙</button>
        </div>

        <div class="info-bar">
            <div class="info-item">ΣΥΝΟΛΟ <span id="total" class="info-value">0</span></div>
            <div class="info-item">ΚΥΚΛΟΙ <span id="cycles" class="info-value">0</span></div>
            <div class="info-item">
                ΧΡΟΝΟΣ
                <div class="timer-box">
                    <span id="session-timer" class="info-value" style="color:#d4af37; margin:0;">00:00:00</span>
                    <button id="pause-btn" onclick="toggleTimer(event)">⏸</button>
                </div>
            </div>
        </div>
        
        <button class="nav-btn" style="border:none; opacity:0.4; font-size:0.6rem;" onclick="resetAll()">ΜΗΔΕΝΙΣΜΟΣ</button>
    </div>

    <div id="settings-panel" class="panel">
        <div class="panel-header">
            <h3 style="margin:0;">Ρυθμίσεις</h3>
            <span class="close-panel" onclick="togglePanel('settings-panel')">✕</span>
        </div>
        <label>Κανόνας Προσευχής</label>
        <select id="knot-select" onchange="updateSettings()">
            <option value="33">33 κόμποι</option>
            <option value="100">100 κόμποι</option>
            <option value="custom">Επιλογή κόμπων...</option>
            <option value="time">Επιλογή χρόνου (λεπτά)...</option>
            <option value="free">Χωρίς στόχο</option>
        </select>
        <input type="number" id="custom-input" style="display:none;" placeholder="Εισάγετε αριθμό..." oninput="updateSettings()">
        
        <label style="display:block; margin: 20px 0 10px;">Δόνηση</label>
        <label style="display:flex; align-items:center; gap:10px; margin-bottom:15px; cursor:pointer;">
            <input type="checkbox" id="vib-on" style="width:auto; margin:0;" onclick="saveVib(this)"> Σε κάθε κόμπο
        </label>
        <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
            <input type="checkbox" id="vib-off" style="width:auto; margin:0;" onclick="saveVib(this)"> Μόνο στον τερματισμό
        </label>
    </div>

    <div id="prayers-panel" class="panel">
        <div class="panel-header">
            <h3 style="margin:0;">Βιβλίο Προσευχών</h3>
            <span class="close-panel" onclick="togglePanel('prayers-panel')">✕</span>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:25px;">
            <input type="text" id="new-prayer-input" placeholder="Νέα προσευχή..." style="margin:0;">
            <button onclick="addNewPrayer()" style="background:#d4af37; border:none; border-radius:12px; padding:0 15px; color:#000; font-weight:bold;">+</button>
        </div>
        <div id="prayers-list-edit"></div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const ss = document.getElementById('splash-screen');
                if(ss) { ss.style.opacity = '0'; setTimeout(() => ss.remove(), 600); }
            }, 1000);
        });

        let count = 0, total = 0, target = 33, cycles = 0, targetType = 'knots';
        let elapsedBeforePause = 0, startTime = null, sessionInterval = null, isPaused = true;
        let pIndex = 0, startX = 0, dimStartX = 0;

        const defaultPrayers = ["Κύριε Ἰησοῦ Χριστέ,<br>ἐλέησόν με", "Ὑπεραγία Θεοτόκε,<br>σῶσον ἡμᾶς", "Ἅγιε τοῦ Θεοῦ,<br>πρέσβευε ὑπὲρ ἡμῶν"];
        let prayers = JSON.parse(localStorage.getItem('my_prayers')) || [...defaultPrayers];

        function togglePanel(id) {
            document.getElementById(id).classList.toggle('open');
            if (id === 'prayers-panel') renderPrayerList();
        }

        // DIM OVERLAY LOGIC
        const dimOverlay = document.getElementById('dim-overlay');
        
        dimOverlay.addEventListener('touchstart', e => {
            dimStartX = e.touches[0].clientX;
        });

        dimOverlay.addEventListener('touchend', e => {
            let diff = Math.abs(dimStartX - e.changedTouches[0].clientX);
            if (diff > 40) { // Αν είναι swipe, κλείνει
                setDim(false);
            } else { // Αν είναι απλό πάτημα, μετράει
                countBead();
            }
        });

        function setDim(show) { 
            dimOverlay.style.display = show ? 'block' : 'none';
            if(show && isPaused) startTimer();
        }

        function addNewPrayer() {
            const input = document.getElementById('new-prayer-input');
            const val = input.value.trim();
            if (val) {
                prayers.push(val);
                localStorage.setItem('my_prayers', JSON.stringify(prayers));
                input.value = '';
                renderPrayerList();
                updatePrayerDisplay();
            }
        }

        function removePrayer(index) {
            if (prayers.length <= 1) return;
            prayers.splice(index, 1);
            if (pIndex >= prayers.length) pIndex = 0;
            localStorage.setItem('my_prayers', JSON.stringify(prayers));
            renderPrayerList();
            updatePrayerDisplay();
        }

        function renderPrayerList() {
            const list = document.getElementById('prayers-list-edit');
            list.innerHTML = prayers.map((p, i) => `
                <div class="prayer-item">
                    <span>${p.replace('<br>', ' ')}</span>
                    <span class="del-btn" onclick="removePrayer(${i})">✕</span>
                </div>
            `).join('');
        }

        function updatePrayerDisplay() { document.getElementById('prayer-text').innerHTML = prayers[pIndex] || ""; }

        // Swipe for Prayers
        document.getElementById('prayer-area').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('prayer-area').addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                pIndex = diff > 0 ? (pIndex + 1) % prayers.length : (pIndex - 1 + prayers.length) % prayers.length;
                updatePrayerDisplay();
            }
        });

        function saveVib(checkbox) {
            document.getElementById('vib-on').checked = (checkbox.id === 'vib-on' && checkbox.checked);
            document.getElementById('vib-off').checked = (checkbox.id === 'vib-off' && checkbox.checked);
            localStorage.setItem('vib_on', document.getElementById('vib-on').checked);
            localStorage.setItem('vib_off', document.getElementById('vib-off').checked);
        }

        function toggleTimer(e) { if (e) e.stopPropagation(); isPaused ? startTimer() : pauseTimer(); }
        
        function startTimer() {
            if (!isPaused) return;
            isPaused = false;
            startTime = Date.now();
            sessionInterval = setInterval(updateSessionUI, 1000);
            document.getElementById('pause-btn').innerText = "⏸";
        }

        function pauseTimer() {
            if (isPaused) return;
            isPaused = true;
            elapsedBeforePause += Date.now() - startTime;
            clearInterval(sessionInterval);
            document.getElementById('pause-btn').innerText = "▶";
        }

        function updateSessionUI() {
            let ms = elapsedBeforePause + (isPaused ? 0 : (Date.now() - startTime));
            let s = Math.floor(ms / 1000);
            
            // Έλεγχος αν ο στόχος είναι χρόνος
            if (targetType === 'time' && target > 0) {
                let totalSecondsTarget = target * 60;
                if (s >= totalSecondsTarget && s % totalSecondsTarget === 0) {
                    cycles++;
                    navigator.vibrate([500, 200, 500]);
                }
            }

            let h = Math.floor(s / 3600).toString().padStart(2, '0');
            let m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            let sec = (s % 60).toString().padStart(2, '0');
            document.getElementById('session-timer').innerText = `${h}:${m}:${sec}`;
            updateUI();
        }

        function countBead() {
            if (isPaused) startTimer();
            total++; count++;
            if (targetType === 'knots' && target > 0 && count >= target) {
                cycles++; count = 0;
                navigator.vibrate([300, 100, 300]);
            } else if (document.getElementById('vib-on').checked) {
                navigator.vibrate(50);
            }
            updateUI();
        }

        function updateUI() {
            let displayVal;
            if (targetType === 'knots' && target > 0) displayVal = target - count;
            else displayVal = total;
            
            document.getElementById('current-count').innerText = displayVal;
            document.getElementById('total').innerText = total;
            document.getElementById('cycles').innerText = cycles;
        }

        function updateSettings() {
            const s = document.getElementById('knot-select'), ci = document.getElementById('custom-input');
            ci.style.display = (s.value === 'custom' || s.value === 'time') ? 'block' : 'none';
            
            if (s.value === 'time') targetType = 'time';
            else targetType = 'knots';

            target = (s.value === 'free') ? 0 : (parseInt(ci.value) || parseInt(s.value) || 33);
            resetAll();
        }

        function resetAll() {
            count = 0; total = 0; cycles = 0; elapsedBeforePause = 0;
            if(sessionInterval) clearInterval(sessionInterval);
            isPaused = true; startTime = null;
            document.getElementById('session-timer').innerText = "00:00:00";
            document.getElementById('pause-btn').innerText = "▶";
            updateUI();
        }

        window.onload = () => {
            updatePrayerDisplay();
            document.getElementById('vib-on').checked = localStorage.getItem('vib_on') === 'true';
            document.getElementById('vib-off').checked = localStorage.getItem('vib_off') === 'true';
            updateUI();
        };
    </script>
</body>
</html>
